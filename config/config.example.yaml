# AI Trend Collector 配置文件
# 复制为 config/config.yaml 后填写真实值

# 飞书机器人配置
# 模式：webhook（群自定义机器人）或 app（企业自建应用机器人）
feishu:
  mode: "webhook"  # webhook | app

  # --- webhook 模式用下面这些 ---
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_WEBHOOK_TOKEN"
  secret: ""  # 可选：安全设置里的签名密钥

  # --- app 模式用下面这些 ---
  app_id: ""
  app_secret: ""
  chat_id: ""  # 目标群的 open_chat_id
  folder_token: ""  # 飞书知识库/文件夹 token，日报文档会归档到这里
  subscribe_url: ""  # 订阅入口链接（如飞书群邀请链接、表单等）

# 存储配置
storage:
  # 可选: json, sqlite
  type: json
  # JSON 模式下的输出目录
  output_dir: ./data
  # SQLite 模式下的数据库路径
  # sqlite_path: ./data/trends.db

# 爬虫全局配置
crawler:
  # 默认请求超时（秒）
  timeout: 30
  # 默认请求间隔（秒），避免触发反爬
  delay: 1
  # 请求重试次数
  retries: 3
  # 默认 User-Agent
  user_agent: "AI-Trend-Collector/0.1.0"
  # 代理配置（可选）
  proxy: ""

# 各数据源配置
sources:
  github_trends:
    enabled: true
    # 语言过滤，空数组表示全部
    languages:
      - python
      - typescript
      - javascript
      - go
      - rust
      - java
    # 抓取周期：daily, weekly, monthly
    period: daily
    # 最多抓取条数
    max_items: 30

  product_hunt:
    enabled: true
    max_items: 30

  arxiv_ai:
    enabled: true
    # 关注的研究领域
    categories:
      - cs.AI
      - cs.CL
      - cs.CV
      - cs.LG
      - cs.IR
    # 查询关键词
    keywords:
      - "large language model"
      - "agent"
      - "multimodal"
    max_items: 30

  huggingface_papers:
    enabled: true
    max_items: 30

# LLM 配置（用于生成中文一句话概述和产品影响分析）
llm:
  # 是否启用 LLM 增强
  enabled: true
  # 提供商：kimi / deepseek / openai
  provider: "kimi"
  # API Key；也可通过环境变量 KIMI_API_KEY / DEEPSEEK_API_KEY / OPENAI_API_KEY 设置
  api_key: ""
  # API Base URL（可选，不填则使用各平台默认值）
  # Kimi 默认：https://api.moonshot.cn/v1
  # DeepSeek 默认：https://api.deepseek.com/v1
  # OpenAI 默认：https://api.openai.com/v1
  base_url: ""
  # 模型名称（可选，不填则使用默认值）
  # Kimi 默认：moonshot-v1-8k
  # DeepSeek 默认：deepseek-chat
  # OpenAI 默认：gpt-4o-mini
  model: ""
  # 单次请求超时（秒）
  timeout: 60
  # 最大输出 token 数
  max_tokens: 300
  # 生成温度（0-1，越低越稳定）
  temperature: 0.3

# AIHues 文章生成配置
article_generation:
  # 是否启用自动生成 AIHues Resources 文章
  enabled: false
  # 每天生成文章数量
  limit: 5
  # 生成模式：template（模板）或 llm（大模型）
  mode: "template"
  # AIHues 仓库相对路径（默认 ai-trend-collector 的父目录）
  aihues_repo: ".."
  # 文章 CTA 链接和文案
  cta_link: "/tools"
  cta_text: "Browse AI Tools"

# 调度配置
schedule:
  # 是否启用定时任务
  enabled: false
  # 每天早上 10 点执行一次
  time: "10:00"
